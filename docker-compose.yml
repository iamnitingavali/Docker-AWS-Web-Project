version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: DockerLearn_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockerlearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dockerlearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: DockerLearn_Backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dockerlearn
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-in-production-use-aws-secrets-manager
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - backend_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build:
      context: .              # This allows Docker to see the WHOLE project
      dockerfile: ./frontend/Dockerfile
    container_name: DockerLearn_Nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - app_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data:
    name: dockerlearn_db_data
  backend_modules:
    name: dockerlearn_modules

networks:
  app_network:
    driver: bridge
    name: dockerlearn_network
