<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DockerLearn</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="logo">🐳 DockerLearn</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <h1>Create your account</h1>
    <p class="subtitle">Free forever · No credit card needed</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg">Account created! Redirecting to login...</div>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8"/>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required autocomplete="new-password"/>
      </div>
      <p style="font-size:12px;color:var(--gray);margin-bottom:16px;">
        By signing up, you agree to our <a href="/terms.html" style="color:var(--blue)">Terms of Service</a> and <a href="/privacy.html" style="color:var(--blue)">Privacy Policy</a>.
      </p>
      <button type="submit" class="btn btn-primary btn-full" id="reg-btn">Create Account</button>
    </form>

    <p class="form-footer">Already have an account? <a href="/login.html">Log in</a></p>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.classList.add('show');
    return;
  }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById('success-msg').classList.add('show');
      setTimeout(() => window.location.href = '/login.html', 1500);
    } else {
      errEl.textContent = data.error || 'Registration failed.';
      errEl.classList.add('show');
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  } catch {
    errEl.textContent = 'Server error. Is the backend running?';
    errEl.classList.add('show');
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
